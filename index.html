<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonic Pin Ring Drive Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Panel Izquierdo: Controles y Resultados -->
        <aside class="sidebar">
            <header class="header">
                <h1>Harmonic Pin Ring Drive</h1>
            </header>

            <section class="panel controls-panel">
                <h2>Controles y Ajustes</h2>
                <div id="alert-box" class="alert-box hidden"></div>

                <div class="input-group">
                    <label for="zi">Dientes Corona Interna (Zi):</label>
                    <input type="number" id="zi" data-input="zi" value="40" step="1">
                </div>

                <div class="input-group">
                    <label for="za">Dientes Corona Externa (Za):</label>
                    <input type="number" id="za" data-input="za" value="44" step="1">
                </div>

                <div class="input-group">
                    <label for="dp">Diámetro del Pin (Dp, mm):</label>
                    <input type="number" id="dp" data-input="dp" value="3.0" step="0.1">
                </div>

                <div class="input-group">
                    <label for="p">Paso de Engranajes (P, mm):</label>
                    <input type="number" id="p" data-input="p" value="2.0" step="0.1">
                </div>

                <h3 class="sub-heading">
                    Tolerancias 3D
                    <span class="tooltip" title="Se sugieren 0.15mm extra para FDM">ⓘ</span>
                </h3>

                <div class="input-group">
                    <label for="pinClearance">Holgura del Pin (mm):</label>
                    <input type="number" id="pinClearance" data-input="pinClearance" value="0.15" step="0.01">
                </div>

                <div class="input-group">
                    <label for="toothClearance">Juego entre dientes (mm):</label>
                    <input type="number" id="toothClearance" data-input="toothClearance" value="0.15" step="0.01">
                </div>

                <div class="input-group">
                    <button id="btn-export" type="button">Exportar a JSON</button>
                    <button id="btn-import" type="button">Importar</button>
                    <input type="file" id="input-import" accept=".json" style="display:none;">
                </div>
            </section>

            <section class="panel results-panel">
                <h2>Resultados numéricos</h2>
                <table>
                    <tbody>
                        <tr><td>Cantidad de pines ($N_p$)</td><td><span id="res-np">-</span></td></tr>
                        <tr><td>Relación (InFix)</td><td><span id="res-infix">-</span></td></tr>
                        <tr><td>Relación (OutFix)</td><td><span id="res-outfix">-</span></td></tr>
                        <tr><td>Semieje Menor</td><td><span id="res-minor-axis">-</span></td></tr>
                        <tr><td>Semieje Mayor</td><td><span id="res-major-axis">-</span></td></tr>
                        <tr><td>Carrera radial</td><td><span id="res-radial-stroke">-</span></td></tr>
                        <tr><td>Longitud de pista</td><td><span id="res-track-length">-</span></td></tr>
                    </tbody>
                </table>
                <div class="fusion-guide">
                    <h3>Guía Fusion 360</h3>
                    <p>Transmitter: Elipse base</p>
                </div>
            </section>
        </aside>

        <!-- Panel Derecho: Lienzo de previsualización 2D -->
        <main class="main-content">
            <div class="canvas-container">
                <svg id="viewport" viewBox="-500 -500 1000 1000" style="width: 100%; height: 100%;"></svg>
            </div>
        </main>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
